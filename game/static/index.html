<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>再玩三分钟</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 20% 20%, #4338ca 0%, #1f1a5a 38%, #0f1024 100%);
            color: #fff;
            min-height: 100vh;
        }
        .page {
            width: 100%;
            max-width: 1080px;
            margin: 0 auto;
            padding: 24px 16px 44px;
        }
        .portal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
        }
        .portal-title h1 {
            font-size: 32px;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: 0.3px;
            background: linear-gradient(90deg, #ffd200, #f7971e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .portal-title p {
            color: rgba(255, 255, 255, 0.65);
            margin-top: 8px;
            font-size: 14px;
        }
        .games-grid {
            position: relative;
            z-index: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 16px;
        }
        .game-card {
            border-radius: 18px;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            min-height: 240px;
        }
        .game-cover {
            height: 126px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 58px;
            background: linear-gradient(140deg, #5b4ce2 0%, #7f53ff 55%, #3f2a8a 100%);
        }
        .game-card-body {
            display: flex;
            flex: 1;
            flex-direction: column;
            padding: 14px;
            gap: 10px;
        }
        .game-name { font-size: 20px; font-weight: 700; }
        .game-desc { color: rgba(255, 255, 255, 0.65); font-size: 13px; line-height: 1.5; flex: 1; }
        .game-meta { color: rgba(255, 255, 255, 0.48); font-size: 12px; }
        .play-btn {
            width: 100%;
            border: 0;
            border-radius: 12px;
            font-weight: 700;
            padding: 11px 14px;
            color: #1a1a2e;
            cursor: pointer;
            background: linear-gradient(135deg, #ffd200, #f7971e);
            transition: transform 0.15s ease;
            font-size: 14px;
        }
        .play-btn:hover { transform: translateY(-1px); }
        .play-btn:active { transform: translateY(1px); }
        .play-btn.disabled {
            background: rgba(255, 255, 255, 0.16);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
        }
        .loading-hint {
            text-align: center;
            padding: 60px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 15px;
        }
        @media (max-width: 640px) {
            .portal-header { flex-direction: column; align-items: flex-start; }
            .portal-title h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
<main class="page">
    <section class="portal-header">
        <div class="portal-title">
            <h1>小游戏空间</h1>
            <p>即点即玩，后续会持续上新小游戏</p>
        </div>
        <div id="userArea"></div>
    </section>

    <section class="games-grid" id="gamesGrid">
        <div class="loading-hint">加载游戏列表...</div>
    </section>
</main>

<script src="/js/common/auth.js"></script>
<script>
const STATUS_TAG = { online: "已上线", coming: "即将上线", offline: "维护中" };

function escHtml(s) {
    if (s == null || s === "") return "";
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function renderGames(list) {
    const grid = document.getElementById("gamesGrid");
    if (!list || !list.length) {
        grid.innerHTML = '<div class="loading-hint">暂无游戏</div>';
        return;
    }
    grid.innerHTML = list.map(function (game) {
        const tag = STATUS_TAG[game.status] || escHtml(game.status);
        const button = game.status === "online" && game.url
            ? '<button class="play-btn" data-url="' + escHtml(game.url) + '">点击即玩</button>'
            : '<button class="play-btn disabled">敬请期待</button>';
        return '<article class="game-card">' +
            '<div class="game-cover">' + escHtml(game.icon || "🎮") + '</div>' +
            '<div class="game-card-body">' +
                '<h3 class="game-name">' + escHtml(game.name) + '</h3>' +
                '<p class="game-desc">' + escHtml(game.desc) + '</p>' +
                '<div class="game-meta">' + tag + '</div>' +
                button +
            '</div></article>';
    }).join("");
}

async function loadGames() {
    try {
        var data = await GamePortalAuth.api("/api/games");
        if (data.code === 0) {
            renderGames(data.data.list);
        } else {
            document.getElementById("gamesGrid").innerHTML = '<div class="loading-hint">加载失败</div>';
        }
    } catch (e) {
        document.getElementById("gamesGrid").innerHTML = '<div class="loading-hint">网络错误</div>';
    }
}

document.getElementById("gamesGrid").addEventListener("click", function (event) {
    var button = event.target.closest(".play-btn");
    if (!button || button.classList.contains("disabled")) return;
    var url = button.getAttribute("data-url");
    if (url) window.location.href = url;
});

window.GamePortalAuth.init({ mountId: "userArea", gameKey: "portal" });
loadGames();
</script>
</body>
</html>
