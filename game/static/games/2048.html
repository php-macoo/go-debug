<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数字冲冲冲 - 2048</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1333 0%, #3b1f6e 50%, #1a1333 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            color: #fff;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 480px;
            padding: 14px 16px 8px;
            gap: 8px;
        }
        .title { font-size: 19px; font-weight: 700; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .score-box {
            text-align: center;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 4px 14px;
            min-width: 70px;
        }
        .score-label { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 16px;
        }
        .grid-container {
            position: relative;
            border-radius: 14px;
            padding: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            touch-action: none;
        }
        .grid-bg {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .cell-bg {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
        }
        .tiles-layer {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
        }
        .tile {
            position: absolute;
            width: 72px;
            height: 72px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            transition: top 0.12s ease, left 0.12s ease;
            z-index: 1;
        }
        .tile.merged { z-index: 2; animation: tilePop 0.2s ease; }
        .tile.new { animation: tileAppear 0.2s ease; }
        @keyframes tilePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.18); }
            100% { transform: scale(1); }
        }
        @keyframes tileAppear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .bottom-bar {
            width: 100%;
            max-width: 480px;
            padding: 14px 16px 24px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .action-btn {
            padding: 10px 24px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .action-btn:hover { background: rgba(255,255,255,0.16); }
        .game-msg {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.55);
            border-radius: 14px;
            z-index: 10;
            flex-direction: column;
            gap: 14px;
        }
        .game-msg.active { display: flex; }
        .game-msg h2 { font-size: 28px; }
        .game-msg .btn { padding: 10px 30px; font-size: 15px; }
        @media (max-width: 380px) {
            .cell-bg, .tile { width: 62px; height: 62px; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="title">🔢 数字冲冲冲</div>
    <div class="header-right">
        <button class="hdr-btn" onclick="location.href='/'">返回大厅</button>
        <div id="userArea"></div>
    </div>
</div>

<div class="header" style="padding-top:0;justify-content:center;gap:12px;">
    <div class="score-box">
        <div class="score-label">分数</div>
        <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="score-box">
        <div class="score-label">最高</div>
        <div class="score-value" id="bestDisplay">0</div>
    </div>
</div>

<div class="game-area">
    <div class="grid-container" id="gridContainer">
        <div class="grid-bg" id="gridBg"></div>
        <div class="tiles-layer" id="tilesLayer"></div>
        <div class="game-msg" id="gameMsg">
            <h2 id="msgTitle"></h2>
            <button class="btn btn-primary" onclick="newGame()">再来一局</button>
        </div>
    </div>
</div>

<div class="bottom-bar">
    <button class="action-btn" onclick="newGame()">新游戏</button>
</div>

<script src="/js/common/auth.js"></script>
<script>
const SIZE = 4;
const GAP = 8;
const TILE_SIZE = 72;
const STEP = TILE_SIZE + GAP;

const TILE_STYLES = {
    2:    { bg: "#eee4da", color: "#776e65", size: "28px" },
    4:    { bg: "#ede0c8", color: "#776e65", size: "28px" },
    8:    { bg: "#f2b179", color: "#fff",    size: "28px" },
    16:   { bg: "#f59563", color: "#fff",    size: "26px" },
    32:   { bg: "#f67c5f", color: "#fff",    size: "26px" },
    64:   { bg: "#f65e3b", color: "#fff",    size: "26px" },
    128:  { bg: "#edcf72", color: "#fff",    size: "24px" },
    256:  { bg: "#edcc61", color: "#fff",    size: "24px" },
    512:  { bg: "#edc850", color: "#fff",    size: "24px" },
    1024: { bg: "#edc53f", color: "#fff",    size: "20px" },
    2048: { bg: "#edc22e", color: "#fff",    size: "20px" },
    4096: { bg: "#3c3a32", color: "#fff",    size: "18px" },
    8192: { bg: "#3c3a32", color: "#fff",    size: "18px" }
};

let grid = [];
let score = 0;
let best = parseInt(localStorage.getItem("game2048_best") || "0", 10);
let gameOver = false;
let won = false;
let keepPlaying = false;
let tileId = 0;

function initGridBg() {
    const bg = document.getElementById("gridBg");
    bg.innerHTML = "";
    for (let i = 0; i < SIZE * SIZE; i++) {
        const cell = document.createElement("div");
        cell.className = "cell-bg";
        bg.appendChild(cell);
    }
}

function emptyGrid() {
    const g = [];
    for (let r = 0; r < SIZE; r++) {
        g[r] = [];
        for (let c = 0; c < SIZE; c++) {
            g[r][c] = null;
        }
    }
    return g;
}

function availableCells() {
    const cells = [];
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (!grid[r][c]) cells.push({ r, c });
        }
    }
    return cells;
}

function addRandomTile() {
    const cells = availableCells();
    if (!cells.length) return null;
    const cell = cells[Math.floor(Math.random() * cells.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const tile = { id: ++tileId, value, r: cell.r, c: cell.c, mergedFrom: null, isNew: true };
    grid[cell.r][cell.c] = tile;
    return tile;
}

function tilePos(r, c) {
    return { top: r * STEP, left: c * STEP };
}

function getTileStyle(value) {
    return TILE_STYLES[value] || { bg: "#3c3a32", color: "#fff", size: "18px" };
}

function renderTiles() {
    const layer = document.getElementById("tilesLayer");
    layer.innerHTML = "";
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const tile = grid[r][c];
            if (!tile) continue;
            const pos = tilePos(r, c);
            const style = getTileStyle(tile.value);
            const el = document.createElement("div");
            el.className = "tile";
            if (tile.isNew) el.className += " new";
            if (tile.mergedFrom) el.className += " merged";
            el.style.top = pos.top + "px";
            el.style.left = pos.left + "px";
            el.style.background = style.bg;
            el.style.color = style.color;
            el.style.fontSize = style.size;
            el.textContent = tile.value;
            layer.appendChild(el);
        }
    }
    document.getElementById("scoreDisplay").textContent = score;
    document.getElementById("bestDisplay").textContent = best;
}

function clearTileFlags() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c]) {
                grid[r][c].isNew = false;
                grid[r][c].mergedFrom = null;
            }
        }
    }
}

function slide(row) {
    let filtered = row.filter((t) => t !== null);
    const result = [];
    let moved = false;
    for (let i = 0; i < filtered.length; i++) {
        if (i + 1 < filtered.length && filtered[i].value === filtered[i + 1].value) {
            const newValue = filtered[i].value * 2;
            result.push({ id: ++tileId, value: newValue, mergedFrom: [filtered[i], filtered[i + 1]], isNew: false });
            score += newValue;
            i++;
            moved = true;
        } else {
            result.push(filtered[i]);
        }
    }
    while (result.length < SIZE) result.push(null);
    for (let i = 0; i < SIZE; i++) {
        if (row[i] !== result[i]) moved = true;
    }
    return { result, moved };
}

function moveLeft() {
    let moved = false;
    for (let r = 0; r < SIZE; r++) {
        const row = grid[r].slice();
        const { result, moved: m } = slide(row);
        grid[r] = result;
        if (m) moved = true;
    }
    return moved;
}

function moveRight() {
    let moved = false;
    for (let r = 0; r < SIZE; r++) {
        const row = grid[r].slice().reverse();
        const { result, moved: m } = slide(row);
        grid[r] = result.reverse();
        if (m) moved = true;
    }
    return moved;
}

function moveUp() {
    let moved = false;
    for (let c = 0; c < SIZE; c++) {
        const col = [];
        for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
        const { result, moved: m } = slide(col);
        for (let r = 0; r < SIZE; r++) grid[r][c] = result[r];
        if (m) moved = true;
    }
    return moved;
}

function moveDown() {
    let moved = false;
    for (let c = 0; c < SIZE; c++) {
        const col = [];
        for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
        col.reverse();
        const { result, moved: m } = slide(col);
        const reversed = result.reverse();
        for (let r = 0; r < SIZE; r++) grid[r][c] = reversed[r];
        if (m) moved = true;
    }
    return moved;
}

function hasAvailableMoves() {
    if (availableCells().length > 0) return true;
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const val = grid[r][c] ? grid[r][c].value : 0;
            if (c + 1 < SIZE && grid[r][c + 1] && grid[r][c + 1].value === val) return true;
            if (r + 1 < SIZE && grid[r + 1][c] && grid[r + 1][c].value === val) return true;
        }
    }
    return false;
}

function hasWon() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] && grid[r][c].value >= 2048) return true;
        }
    }
    return false;
}

function setPositions() {
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c]) {
                grid[r][c].r = r;
                grid[r][c].c = c;
            }
        }
    }
}

function move(direction) {
    if (gameOver) return;
    clearTileFlags();
    let moved = false;
    if (direction === "left") moved = moveLeft();
    else if (direction === "right") moved = moveRight();
    else if (direction === "up") moved = moveUp();
    else if (direction === "down") moved = moveDown();

    if (!moved) return;

    setPositions();
    addRandomTile();

    if (score > best) {
        best = score;
        localStorage.setItem("game2048_best", String(best));
    }

    renderTiles();

    if (!keepPlaying && hasWon()) {
        won = true;
        showMsg("🎉 达成 2048!");
        return;
    }
    if (!hasAvailableMoves()) {
        gameOver = true;
        showMsg("游戏结束");
    }
}

function showMsg(text) {
    document.getElementById("msgTitle").textContent = text;
    document.getElementById("gameMsg").classList.add("active");
}

function newGame() {
    grid = emptyGrid();
    score = 0;
    gameOver = false;
    won = false;
    keepPlaying = false;
    tileId = 0;
    document.getElementById("gameMsg").classList.remove("active");
    addRandomTile();
    addRandomTile();
    setPositions();
    renderTiles();
}

document.addEventListener("keydown", (event) => {
    const map = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" };
    if (map[event.key]) {
        event.preventDefault();
        move(map[event.key]);
    }
});

let touchStartX = 0, touchStartY = 0;
const container = document.getElementById("gridContainer");
container.addEventListener("touchstart", (event) => {
    const touch = event.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
}, { passive: true });
container.addEventListener("touchend", (event) => {
    const touch = event.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 30) return;
    if (absDx > absDy) {
        move(dx > 0 ? "right" : "left");
    } else {
        move(dy > 0 ? "down" : "up");
    }
});

window.GamePortalAuth.init({ mountId: "userArea", gameKey: "2048" });
initGridBg();
newGame();
</script>
</body>
</html>
